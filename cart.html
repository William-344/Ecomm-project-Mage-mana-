<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Roboto&display=swap" rel="stylesheet">
    <title>Your Cart - Mage's Mana</title>
    <link rel="stylesheet" href="styles.css">
    <a href="cart.html">Cart (0)</a>
</head>

<body>

<header>
        <div class="logo">
            <img src="images/Jimtheball.png" alt="Mage's Mana Hobby & Games logo">
            <div class="logo-text">
                <span class="main-title">Mage's Mana</span>
                <span class="sub-title">Hobby & Games</span>
        </div>

        <div class="nav-buttons">
            <a href="Index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="events.html">Events</a>
            <a href="about.html">About</a>
            <a href="cart.html">Cart (0)</a>
        </div>
    </div>
</header>

<main style="text-align:center; margin-top: 2rem;">

    <div id="cartItems"></div>

    <h2 id="total"></h2>

    <button onclick="clearCart()">Clear Cart</button>

</main>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayCart() {
    const container = document.getElementById("cartItems");
    const totalEl = document.getElementById("total");

    container.innerHTML = "";

    let total = 0;

    if (cart.length === 0) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        totalEl.textContent = "";
        return;
    }

    cart.forEach((item, index) => {
        total += item.price;

        container.innerHTML += `
            <div style="margin: 1rem;">
                <p><strong>${item.name}</strong></p>
                <p>$${item.price}</p>
                <button onclick="removeItem(${index})">Remove</button>
            </div>
        `;
    });

    totalEl.textContent = "Total: $" + total.toFixed(2);
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function clearCart() {
    localStorage.removeItem("cart");
    cart = [];
    displayCart();
}
function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const cartLink = document.querySelector(".nav-buttons a[href='cart.html']");

    if (!cartLink) return; // ✅ prevents crash

    cartLink.textContent = `Cart (${cart.length})`;
}
displayCart();
updateCartCount();
</script>

<footer>
    <div class="footer-section">
        <h4>Visit Our Store!</h4>
        <p>123 Fantasy Lane, Imaginaria</p>
    </div>
    <div class="footer-section">
        <h4>Opening Hours</h4>
        <div class="hours">
            <div>MON - FRI: 12pm - 9pm</div>
            <div>SAT - SUN: 11am - 8pm</div>
        </div>
    </div>
    <div class="footer-section">
        <h4>Need Help?</h4>
        <p>Open a Ticket by Contacting us at Support@MMHG.com</p>
    </div>
</footer>
</body>
</html>
