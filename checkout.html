<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Roboto&display=swap" rel="stylesheet">
    <title>Mage's Mana Hobby & Games</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="images/Jimtheball.png" alt="Mage's Mana Hobby & Games logo">
            <div class="logo-text">
                <span class="main-title">Mage's Mana</span>
                <span class="sub-title">Hobby & Games</span>
            </div>

        <div class="nav-buttons">
            <a href="Index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="events.html">Events</a>
            <a href="about.html">About</a>
            <a href="cart.html" id="cart-link">Cart (0)</a>
        </div>
    </div>
</header>
   <main class="checkout-page">

    <form onsubmit="placeOrder(); return false;">

    <div class="checkout-container">

        <!-- LEFT: Shipping -->
        <div class="checkout-left">
            <h2>Shipping Information</h2>

            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="Phone Number" required>

            <input type="text" placeholder="Street Address 1" required>
            <input type="text" placeholder="Street Address 2 (Optional)">

            <div class="row">
                <input type="text" placeholder="City" required>

                <select required>
                    <option value="" disabled selected>State</option>
                    <option>FL</option>
                    <option>CA</option>
                    <option>NY</option>
                </select>

                <input type="text" placeholder="ZIP" required>
            </div>
        </div>

        <!-- RIGHT: Payment -->
        <div class="checkout-right">
            <h2>Payment</h2>

            <select required>
                <option value="" disabled selected>Payment Method</option>
                <option>Credit Card</option>
                <option>Debit Card</option>
            </select>

            <input type="text" placeholder="Card Number" required>

            <div class="row">
                <input type="text" placeholder="MM/YY" required>
                <input type="text" placeholder="CVV" required>
            </div>
        </div>

    </div>

    <!-- ORDER SUMMARY -->
    <div class="order-summary">
        <h2>Order Summary</h2>
        <div id="summary"></div>
        <button type="submit" class="checkout-btn">Place Order</button>
    </div>
    </form>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let summary = document.getElementById("summary");

    let total = 0;

    cart.forEach(item => {
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        summary.innerHTML += `
            <p>${item.name} x ${item.qty} = $${itemTotal.toFixed(2)}</p>
        `;
    });

    summary.innerHTML += `<h2>Total: $${total.toFixed(2)}</h2>`;

    if (cart.length === 0) {
    summary.innerHTML = "<p>Your cart is empty.</p>";
    document.querySelector(".checkout-btn").disabled = true;
    return;
}

});

</script>

<footer>
        <div class="footer-section">
            <h4>Visit Our Store!</h4>
            <p>123 Fantasy Lane, Imaginaria</p>
        </div>
        <div class="footer-section">
            <h4>Opening Hours</h4>
            <div class="hours">
                <div>MON - FRI: 12pm - 9pm</div>
                <div>SAT - SUN: 11am - 8pm</div>
            </div>
        </div>
        <div class="footer-section">
            <h4>Need Help?</h4>
            <p>Open a Ticket by Contacting us at Support@MMHG.com</p>
        </div>
    </footer>
<script src="cart.js"></script>
</body>
</html>
